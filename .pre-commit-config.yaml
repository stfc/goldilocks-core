repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff-check
      - id: ruff-format

  - repo: local
    hooks:
      - id: pytest
        name: pytest with branch coverage
        entry: uv run pytest --cov --cov-report=term-missing:skip-covered
        language: system
        pass_filenames: false

