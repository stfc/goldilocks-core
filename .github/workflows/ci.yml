name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_FROZEN: "1"
  UV_NO_PROGRESS: "1"

jobs:
  quality-and-test:
    name: Quality, tests, and mutations
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          enable-cache: true

      - name: Install frozen dependencies
        run: uv sync --group dev

      - name: Ruff check
        run: uv run ruff check src tests scripts

      - name: Ruff format check
        run: uv run ruff format --check src tests scripts

      - name: Pytest with branch coverage
        run: >-
          uv run pytest --cov --cov-report=term-missing:skip-covered
          --cov-report=xml

      - name: Mutation testing
        run: |
          uv run mutmut run --max-children 4
          uv run mutmut export-cicd-stats
          uv run python scripts/check_mutation_score.py \
            mutants/mutmut-cicd-stats.json --minimum 0.74 \
            | tee -a "$GITHUB_STEP_SUMMARY"

  package-build:
    name: Build distribution
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          enable-cache: false

      - name: Build source and wheel distributions
        run: uv build --no-sources

      - name: Verify distribution contents
        run: python scripts/validate_distribution.py dist
