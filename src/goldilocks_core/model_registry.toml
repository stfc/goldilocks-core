[defaults.kpoints]
advisor = "qrf_kdistance"
name = "kpoints-goldilocks-QRF"
version = "QRF95"
model_type = "random_forest"
target = "k_distance"
feature_set = "qrf_comp_struct_soap_lattice_metal"
feature_schema = "qrf-483-v1"
feature_count = 483
source = "huggingface"
location = "STFC-SCD/kpoints-goldilocks-QRF::QRF95.pkl"
revision = "75588288f755522e47984b5a31b82824860d6943"
interval_confidence = 0.95
interval_quantiles = [0.025, 0.5, 0.975]

[defaults.kpoints.calibration]
method = "symmetric_additive_bounds-v1"
correction = -0.0016

[defaults.kpoints.runtime]
goldilocks-core = "0.1.0"
numpy = "2.4.4"
scikit-learn = "1.7.2"
sklearn-quantile = "0.1.1"
joblib = "1.5.3"
matminer = "0.10.1"
dscribe = "2.1.2"
pymatgen = "2026.3.23"
torch = "2.12.1"
torch-geometric = "2.8.0"

[defaults.kpoints.features]
composition_featurizers = ["ElementProperty", "Stoichiometry", "ValenceOrbital"]
element_property_preset = "magpie"
impute_nan = true
structure_featurizers = ["GlobalSymmetryFeatures", "DensityFeatures"]
global_symmetry_features = ["spacegroup_num", "crystal_system_int", "is_centrosymmetric"]
density_features = ["density", "vpa", "packing fraction"]
soap_species = "X"
soap_r_cut = 10.0
soap_n_max = 8
soap_l_max = 6
soap_sigma = 1.0
soap_periodic = true
soap_sparse = false
soap_reduction = "mean"
lattice_symprec = 0.01
metallicity_graph_radius = 10.0
metallicity_max_neighbors = 12

[defaults.kpoints.metallicity]
source = "huggingface"
location = "JunwenYin/metallicity-goldilocks-CGCNN"
revision = "a95dc7d8902c8088f709e13c602864167838cc17"
checkpoint_file = "is_metal.ckpt"
atom_init_file = "atom_init.json"
