[project]
name = "goldilocks-core"
version = "0.1.0"
description = "Materials machine learning tools for recommending DFT calculation inputs."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "joblib>=1.5.3",
    "matminer>=0.10.1",
    "numpy>=2.4.4",
    "pymatgen>=2026.3.23",
]

[project.scripts]
goldilocks-core = "goldilocks_core.cli.core:main"
goldilocks-kmesh = "goldilocks_core.cli.cli_kmesh:main"

[dependency-groups]
dev = [
    "pre-commit>=4.5.1",
    "pytest>=9.0.3",
    "ruff>=0.15.11",
]

[tool.uv]
package = true

[tool.pytest.ini_options]
pythonpath = ["src"]

[tool.ruff]
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I"]

